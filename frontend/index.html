<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronex AI Client</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-overlay" class="overlay">
        <div class="login-card">
            <h2>Welcome to Ronex AI</h2>
            <p>Please log in with your name to access the chatbot.</p>
            <input type="text" id="username-input" placeholder="Enter your name..." autocomplete="off">
            <button id="login-btn">Launch Chatbot</button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <div id="app-container" class="app-container hidden">
        <header class="chat-header">
            <div class="brand-info">
                <img src="../assets/logo.png" alt="Ronex Logo" class="app-logo" onerror="this.style.display='none'">
                <h1>Ronex AI</h1>
            </div>
            <div class="user-profile">
                <span id="user-display-name">Guest User</span>
                <button id="logout-btn">Logout</button>
            </div>
        </header>

        <main class="chat-box" id="chat-box">
            <div class="message system-msg">
                <p>System secure connection established. Welcome to Ronex AI platform interface.</p>
            </div>
        </main>

        <footer class="chat-footer">
            <form id="chat-form" onsubmit="event.preventDefault();">
                <input type="text" id="message-input" placeholder="Type a message to Ronex AI..." autocomplete="off" required>
                <button type="submit" id="send-btn">Send Message</button>
            </form>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
